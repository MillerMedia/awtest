# .github/workflows/sync-public.yml
# Syncs clean code (without BMAD/agent artifacts) to the public repo on release tags.
name: Sync to Public Repo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove private artifacts
        run: |
          rm -rf _bmad _bmad-output .claude .cursor
          rm -f summary.txt coverage.out awtest
          # Remove this sync workflow (only lives in private repo)
          rm -f .github/workflows/sync-public.yml

      - name: Push to public repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage removals
          git add -A
          git commit -m "Sync from private repo" --allow-empty

          # Push branch and tags to public repo
          git remote add public https://x-access-token:${GH_PAT}@github.com/MillerMedia/awtest.git
          git push public HEAD:main --force
          git push public --tags --force
