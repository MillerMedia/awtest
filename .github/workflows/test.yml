# .github/workflows/test.yml
name: Tests
on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.19'

      - name: Build
        run: go build ./cmd/awtest

      - name: Test
        run: go test -race ./...
