version: 2

builds:
  - binary: awtest
    main: ./cmd/awtest
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: awtest
    binaries:
      - awtest
    repository:
      owner: MillerMedia
      name: homebrew-tap
    description: "AWS credential enumeration for security assessments"
    homepage: "https://github.com/MillerMedia/awtest"
    license: "MIT"

release:
  github:
    owner: MillerMedia
    name: awtest
